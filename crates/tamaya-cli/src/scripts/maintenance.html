<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Maintenance</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .container {
    background: #ffffff;
    border-radius: 16px;
    padding: 3.5rem 3rem;
    max-width: 540px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
    text-align: center;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.75rem;
    color: #111;
  }
  p.message {
    font-size: 1rem;
    color: #555;
    line-height: 1.7;
    margin-bottom: 2rem;
  }
  .footer {
    font-size: 0.8rem;
    color: #aaa;
    border-top: 1px solid #eee;
    padding-top: 1.5rem;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Under Maintenance</h1>
    <p class="message">{{message}}</p>
    <div class="footer">__DOMAIN__</div>
  </div>
</body>
</html>
